<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺灣版 SBTI - 幹話人格測驗</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Header */
        .header { text-align: center; padding: 40px 20px; }
        h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200%;
            animation: gradientMove 3s linear infinite;
            margin-bottom: 10px;
        }
        .subtitle { font-size: 1.2em; color: #aaa; margin-bottom: 20px; }
        .author { font-size: 0.9em; color: #666; }
        
        /* Progress */
        .progress {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 30px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
        }
        .progress-text {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85em;
            color: #aaa;
            z-index: 10;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff, #ff6b6b);
            background-size: 200% 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 20px;
            animation: rainbowMove 2s linear infinite;
        }
        
        /* Questions */
        .question-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            display: none;
            animation: slideUp 0.4s ease;
        }
        .question-card.active { display: block; }
        .question-num { color: #feca57; font-size: 0.9em; margin-bottom: 10px; }
        .question-text { font-size: 1.3em; margin-bottom: 25px; line-height: 1.6; }
        
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        .option:hover {
            background: rgba(255,255,255,0.15);
            border-color: #feca57;
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(254,202,87,0.3);
        }
        .option.selected {
            background: linear-gradient(90deg, rgba(255,107,107,0.3), rgba(254,202,87,0.3));
            border-color: #feca57;
        }
        
        /* Result */
        .result-card { display: none; text-align: center; animation: fadeIn 0.8s ease; }
        .result-card.show { display: block; }
        
        /* Result Image - Big Visual */
        .result-image {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(255,107,107,0.5);
        }
        
        .result-type {
            font-size: 2em;
            font-weight: bold;
            margin: 15px 0;
        }
        .match-rate {
            font-size: 1.2em;
            color: #feca57;
            margin-bottom: 15px;
            padding: 8px 20px;
            background: rgba(254,202,87,0.1);
            border-radius: 20px;
            display: inline-block;
        }
        
        /* Viral Stats */
        .viral-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .viral-stat, .viral-rank {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9em;
        }
        .viral-stat strong { color: #feca57; }
        
        /* Time Info */
        .time-info {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9em;
            margin-bottom: 20px;
            display: inline-block;
        }
        .result-desc {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            line-height: 1.8;
        }
        
        /* Dimensions */
        .dimensions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .dimension {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .dimension-label { font-size: 0.75em; color: #aaa; }
        .dimension-value { font-size: 1em; color: #feca57; margin-top: 5px; font-weight: bold; }
        
        /* Tags */
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }
        .tag {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            background: rgba(255,255,255,0.1);
        }
        
        .disclaimer {
            font-size: 0.8em;
            color: #666;
            margin-top: 30px;
            padding: 15px;
            background: rgba(255,0,0,0.1);
            border-radius: 10px;
        }
        
        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .next-btn, .share-btn, .restart-btn {
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .next-btn {
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            color: #1a1a2e;
            font-weight: bold;
            opacity: 0.5;
            pointer-events: none;
        }
        .next-btn.active { opacity: 1; pointer-events: auto; }
        .share-btn {
            background: transparent;
            border: 2px solid #feca57;
            color: #feca57;
        }
        .restart-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn-group button:hover { transform: scale(1.05); }
        
        /* LINE CTA */
        .cta-box {
            background: linear-gradient(135deg, #06C75530, #06C75520);
            border: 2px solid #06C755;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .cta-box p { margin-bottom: 15px; font-size: 1.1em; }
        .line-btn {
            display: inline-block;
            background: #06C755;
            color: #fff;
            padding: 15px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .line-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(6,199,85,0.4); }
        
        /* Share Preview */
        .share-preview {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
        }
        .preview-label { font-size: 0.85em; color: #aaa; margin-bottom: 10px; }
        .preview-content {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            font-size: 0.9em;
            white-space: pre-wrap;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }

        /* Result Background */
        .result-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .result-bg.show { opacity: 1; animation: bgFloat 5s ease-in-out infinite; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes gradientMove { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes rainbowMove { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }
        @keyframes bgFloat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 臺灣SBTI</h1>
            <p class="subtitle">幹話人格測驗 - 你也是這樣嗎？</p>
            <p class="author">原作者：B站@蛆肉兒串兒 | 臺灣改編版</p>

            <div class="dimensions" id="dimensions"></div>

            <div class="cta-box">

            </div>
        </div>
    </div>

        let currentQuestion = 0;
        let scores = [0, 0, 0];
        let answers = [];
        let startTime = null;
        
        function init() { 
            startTime = Date.now();
            showQuestion(); 
        }

        function showQuestion() {
            const container = document.getElementById('questionContainer');
            container.innerHTML = '';
            const q = questions[currentQuestion];
            const card = document.createElement('div');
            card.className = 'question-card active';
            card.innerHTML = `
                <div class="question-num">第 ${currentQuestion + 1} 題 / 共 ${questions.length} 題</div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    ${q.options.map((opt, i) => `<div class="option" onclick="selectOption(${i}, this)">${opt.text}</div>`).join('')}
                </div>
            `;
            container.appendChild(card);
            
            // Update progress bar and text
            const pct = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            const textEl = document.getElementById('progressText');
            if(textEl) textEl.textContent = `第 ${currentQuestion + 1} 題 / 共 ${questions.length} 題`;
        }

        function selectOption(index, el) {
            // Prevent multiple clicks
            if (el.classList.contains('selected')) return;
            
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            
            const q = questions[currentQuestion];
            const score = q.options[index].score;
            for(let i=0; i<3; i++) scores[i] += score[i];
            answers.push(index);
            
            // Immediately go to next question
            setTimeout(() => {
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    showQuestion();
                } else {
                    showResult();
                }
            }, 300);
        }

        function showResult() {
            const totalScore = scores.reduce((a, b) => a + b, 0);
            const resultIndex = totalScore % results.length;
            const result = results[resultIndex];
            const matchRate = 70 + Math.floor(Math.random() * 25);
            
            document.getElementById('questionContainer').style.display = 'none';
            document.querySelector('.progress').style.display = 'none';
            
            const resultCard = document.getElementById('resultCard');
            resultCard.classList.add('show');
            
            // Show animated background
            const bg = document.getElementById('resultBg');
            bg.classList.add('show');
            bg.style.background = `radial-gradient(circle at center, ${result.color}30 0%, transparent 70%)`;
            
            // Show emoji as big visual
            const img = document.getElementById('resultImage');
            img.textContent = result.emoji;
            img.style.background = `linear-gradient(135deg, ${result.color}40, ${result.color}20)`;
            img.style.boxShadow = `0 0 60px ${result.color}50`;
            
            document.getElementById('resultType').textContent = result.name;
            document.getElementById('resultType').style.color = result.color;
            document.getElementById('matchRate').textContent = `匹配度 ${matchRate}%`;
            
            // Viral: 你是第几位测试者
            const testCount = 1247 + Math.floor(Math.random() * 100);
            const viralInfo = document.getElementById('viralInfo');
            viralInfo.innerHTML = `
                <div class="viral-stat">📊 你是第 <strong>${testCount}</strong> 位測試者</div>
                <div class="viral-rank">🏆 此人格人氣排行：第 ${Math.floor(Math.random() * 5) + 1} 名</div>
            `;
            viralInfo.style.display = 'block';
            
            // Time used
            const timeUsed = Math.floor((Date.now() - startTime) / 1000);
            const timeInfo = document.getElementById('timeInfo');
            timeInfo.innerHTML = `⏱️ 你用了 ${timeUsed} 秒完成測驗`;
            timeInfo.style.display = 'block';
            
            // Tags
            const tagsContainer = document.getElementById('resultTags');
            tagsContainer.innerHTML = result.tags.map(t => `<span class="tag">${t}</span>`).join('');
            
            document.getElementById('resultDesc').textContent = result.desc;
            
            const dimsContainer = document.getElementById('dimensions');
            dimsContainer.innerHTML = result.dims.map(d => `
                <div class="dimension">
                    <div class="dimension-value">${d}</div>
                </div>
            `).join('');
        }
